<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Maiga Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .parallelogram {
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="15,0 100,0 85,100 0,100" /></svg>');
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="15,0 100,0 85,100 0,100" /></svg>');
            mask-size: 100% 100%;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6 text-center">
    <div class="max-w-md">
        <div id="icon-box" class="w-24 h-24 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 parallelogram shadow-lg transition-colors">
            <i class="fa-solid fa-wifi-slash text-4xl"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-800 mb-2">You're Offline</h1>
        <p class="text-gray-500 mb-8 font-medium">It looks like your internet connection is taking a break. Check your signal and try again.</p>
        <button id="retry-btn" onclick="window.location.reload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-95">
            Retry Connection
        </button>
        <button id="share-btn" onclick="shareApp()" class="w-full mt-3 bg-white border-2 border-blue-100 text-blue-600 py-4 rounded-2xl font-black transition-all active:scale-95 flex items-center justify-center gap-2">
            <i class="fa-solid fa-share-nodes"></i> Share with Friends
        </button>
        <p class="mt-8 text-xs text-gray-400 font-bold uppercase tracking-widest"><span id="brand-name">Maiga Social</span> &copy; 2024</p>
    </div>

    <script>
        // Detect the app version based on the URL
        const isYsu = window.location.pathname.includes('ysu.html');

        if (isYsu) {
            // Update text
            document.getElementById('brand-name').textContent = 'YSU Social';
            
            // Update theme colors (Blue -> Green for YSU)
            const iconBox = document.getElementById('icon-box');
            iconBox.classList.replace('bg-blue-100', 'bg-green-100');
            iconBox.classList.replace('text-blue-600', 'text-green-600');

            const retryBtn = document.getElementById('retry-btn');
            retryBtn.classList.replace('bg-blue-600', 'bg-green-600');
            retryBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            retryBtn.classList.replace('shadow-blue-200', 'shadow-green-200');

            const shareBtn = document.getElementById('share-btn');
            shareBtn.classList.replace('border-blue-100', 'border-green-100');
            shareBtn.classList.replace('text-blue-600', 'text-green-600');
        }

        async function shareApp() {
            const brand = document.getElementById('brand-name').textContent;
            const shareData = {
                title: brand,
                text: `I'm using ${brand} to stay connected! Check it out even when you're offline.`,
                url: window.location.origin
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) { console.log('Share failed:', err); }
            } else {
                navigator.clipboard.writeText(window.location.origin);
                alert('Link copied to clipboard!');
            }
        }
    </script>
</body>
</html>
