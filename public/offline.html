<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Maiga Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .parallelogram {
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="15,0 100,0 85,100 0,100" /></svg>');
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon points="15,0 100,0 85,100 0,100" /></svg>');
            mask-size: 100% 100%;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6 text-center">
    <div class="max-w-md">
        <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 parallelogram shadow-lg">
            <i class="fa-solid fa-wifi-slash text-4xl"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-800 mb-2">You're Offline</h1>
        <p class="text-gray-500 mb-8 font-medium">It looks like your internet connection is taking a break. Check your signal and try again.</p>
        <button onclick="window.location.reload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all active:scale-95">
            Retry Connection
        </button>
        <p class="mt-6 text-xs text-gray-400 font-bold uppercase tracking-widest">Maiga Social &copy; 2024</p>
    </div>
</body>
</html>
