name = "maiga-social"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

[kv_namespaces]
binding = "OTP_KV" # The binding name your Worker will use to access this KV Namespace
id = "YOUR_KV_NAMESPACE_ID" # Replace with your actual KV Namespace ID
# preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID" # Optional: for local development with `wrangler dev`

[assets]
directory = "public"
binding = "ASSETS"

[observability]
enabled = true